baseURL = "https://blog.laoxue.ai/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "老薛"
theme = "PaperMod"
pagination.pagerSize = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
hasCJKLanguage = true
summaryLength = 120

[outputs]
home = ["HTML", "RSS", "JSON"]

[minify]
disableXML = false
minifyOutput = true

[params]
env = "production"
title = "老薛"
description = "老薛的长期主义笔记：投资、AI、商业、健康与生活。"
keywords = ["老薛", "AI", "投资", "商业", "加密", "晨间日记"]
author = "老薛"
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
comments = false
mainSections = ["posts"]

[params.homeInfoParams]
Title = "老薛的博客"
Content = "这里放长期主义的思考与记录：AI、投资、商业、健康，以及真正重要的事。"

[[params.socialIcons]]
name = "github"
url = "https://github.com/"

[[menu.main]]
identifier = "posts"
name = "文章"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "archives"
name = "归档"
url = "/archives/"
weight = 20

[[menu.main]]
identifier = "search"
name = "搜索"
url = "/search/"
weight = 30

[[menu.main]]
identifier = "tags"
name = "标签"
url = "/tags/"
weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

[services]
  [services.instagram]
    disableInlineCSS = true
  [services.x]
    disableInlineCSS = true
